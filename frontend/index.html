<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="apple-mobile-web-app-title" content="e-Spanish">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>e-Spanish</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        const svgString = `<svg viewBox="0 0 100 100" width="180" height="180" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#ffffff" /><path d="M50,85 c-15,0 -25,-10 -25,-25 c0,-15 10,-25 25,-25 c15,0 25,10 25,25 v2 h-38 c2,10 9,13 18,13 c7,0 12,-3 15,-8 l8,5 c-5,8 -13,13 -23,13 z m0,-40 c-7,0 -13,5 -15,13 h28 c-2,-8 -8,-13 -13,-13 z" fill="#0ea5e9" /><polygon points="50,15 85,25 50,35 15,25" fill="#0f172a" /><path d="M38,31 v8 c0,5 24,5 24,0 v-8 z" fill="#0f172a" /><rect x="22" y="27" width="2" height="15" fill="#0f172a" /><polygon points="23,42 20,50 26,50" fill="#0f172a" /></svg>`;
        const blob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 180;
          canvas.height = 180;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 180, 180);
          const link = document.createElement('link');
          link.rel = 'apple-touch-icon';
          link.href = canvas.toDataURL('image/png');
          document.head.appendChild(link);
        };
        img.src = url;
      })();
    </script>
  </body>
</html>
